{% extends "base.html" %}

{% block title %}homie — вход{% endblock %}

{% block content %}
<div class="auth-card">
  {% include "auth/_brand.html" %}

  <p class="eyebrow">С возвращением</p>
  <h1 class="title">Вход</h1>
  <p class="subtitle">Управляйте домом со своего аккаунта</p>

  <div id="form-message" class="form-message" role="alert">
    {% if error %}{{ error }}{% endif %}
  </div>

  <form
    id="login-form"
    hx-post="http://localhost:8001/api/auth/login/"
    hx-target="#form-message"
    hx-swap="innerHTML"
    hx-indicator="#login-submit"
    novalidate
  >

    <div class="field">
      <label for="username">Имя пользователя</label>
      <input class="input" type="text" id="username" name="username" placeholder="arseniy" autocomplete="username" required autofocus>
    </div>

    <div class="field">
      <label for="password">Пароль</label>
      <div class="password-field">
        <input class="input" type="password" id="password" name="password" placeholder="Ваш пароль" autocomplete="current-password" required>
        <button class="password-toggle" type="button" data-password-toggle="password" aria-label="Показать пароль">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1.5 9S4 3.5 9 3.5 16.5 9 16.5 9 14 14.5 9 14.5 1.5 9 1.5 9Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <circle cx="9" cy="9" r="2.25" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn btn-primary" type="submit" id="login-submit">
      <span class="btn-label">Войти</span>
      <span class="htmx-indicator">Входим…</span>
    </button>
  </form>

  <p class="auth-footer">
    Нет аккаунта? <a href="http://localhost:8000/invite">Ввести код приглашения</a>
  </p>
</div>
{% endblock %}
