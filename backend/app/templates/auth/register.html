{% extends "base.html" %}

{% block title %}homie — регистрация{% endblock %}

{% block content %}
<div class="auth-card">
  {% include "auth/_brand.html" %}

  <div class="steps" aria-hidden="true">
    <span class="dot"></span>
    <span class="rule"></span>
    <span class="dot is-active"></span>
  </div>

  <p class="eyebrow">Шаг 2 из 2</p>
  <h1 class="title">Создать аккаунт</h1>
  <p class="subtitle">Код принят. Осталось имя и пароль</p>

  <div id="form-message" class="form-message" role="alert">
    {% if error %}{{ error }}{% endif %}
  </div>

  <form
    id="register-form"
    hx-post="/api/auth/register/"
    hx-target="#form-message"
    hx-swap="innerHTML"
    hx-indicator="#register-submit"
    novalidate
  >
    <input type="hidden" name="invite_code" value="{{ invite_code }}">

    <div class="field">
      <label for="username">Имя пользователя</label>
      <input class="input" type="text" id="username" name="username" placeholder="Например, arseniy" autocomplete="username" required>
    </div>

    <div class="field">
      <label for="password">Пароль</label>
      <div class="password-field">
        <input class="input" type="password" id="password" name="password" placeholder="Не меньше 8 символов" autocomplete="new-password" minlength="8" required>
        <button class="password-toggle" type="button" data-password-toggle="password" aria-label="Показать пароль">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1.5 9S4 3.5 9 3.5 16.5 9 16.5 9 14 14.5 9 14.5 1.5 9 1.5 9Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <circle cx="9" cy="9" r="2.25" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="field">
      <label for="password_confirm">Повторите пароль</label>
      <div class="password-field">
        <input class="input" type="password" id="password_confirm" name="password_confirm" placeholder="Ещё раз" autocomplete="new-password" minlength="8" required>
        <button class="password-toggle" type="button" data-password-toggle="password_confirm" aria-label="Показать пароль">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1.5 9S4 3.5 9 3.5 16.5 9 16.5 9 14 14.5 9 14.5 1.5 9 1.5 9Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <circle cx="9" cy="9" r="2.25" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </button>
      </div>
      <p class="field-hint">Пароли должны совпадать</p>
    </div>

    <button class="btn btn-primary" type="submit" id="register-submit">
      <span class="btn-label">Создать аккаунт</span>
      <span class="htmx-indicator">Создаём…</span>
    </button>
  </form>

  <p class="auth-footer">
    Уже есть аккаунт? <a href="/api/auth/login/">Войти</a>
  </p>
</div>
{% endblock %}
